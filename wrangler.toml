name = 'reduxsynthed'
compatibility_date = "2023-10-30"

# Assets configuration
[assets]
directory = "./dist"

# MIME type configurations
[[assets.mime]]
type = "application/javascript"
patterns = ["**/*.js"]

[[assets.mime]]
type = "application/javascript"
patterns = ["**/*.module.js"]

[[assets.mime]]
type = "text/css"
patterns = ["**/*.css"]

# Environment-specific configurations
[env.production]
name = 'reduxsynthed'
