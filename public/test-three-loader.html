<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js Centralized Loader Test</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1722;
      color: #eee;
    }
    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    #info {
      position: fixed;
      top: 10px;
      left: 10px;
      width: 300px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 8px;
      z-index: 10;
      font-size: 14px;
    }
    #logs {
      margin-top: 10px;
      height: 300px;
      overflow-y: auto;
      padding: 10px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 4px;
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 12px;
    }
    .success { color: #4caf50; }
    .warn { color: #ff9800; }
    .error { color: #f44336; }
  </style>
  
  <!-- Three.js import check tool -->
  <script src="/js/three-import-check.js"></script>
  
  <!-- Import map for Three.js -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div id="info">
    <h3>Three.js Centralized Loader Test</h3>
    <div>
      <button id="test-direct">Test Direct Import</button>
      <button id="test-central">Test Central Module</button>
    </div>
    <div id="logs"></div>
  </div>
  
  <script type="module">
    // Custom console logger that captures output
    const logEl = document.getElementById('logs');
    const originalConsole = {
      log: console.log,
      warn: console.warn,
      error: console.error
    };
    
    // Capture console output
    console.log = function(...args) {
      originalConsole.log.apply(console, args);
      const msg = args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : arg).join(' ');
      addLog(msg, 'success');
    };
    
    console.warn = function(...args) {
      originalConsole.warn.apply(console, args);
      const msg = args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : arg).join(' ');
      addLog(msg, 'warn');
    };
    
    console.error = function(...args) {
      originalConsole.error.apply(console, args);
      const msg = args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : arg).join(' ');
      addLog(msg, 'error');
    };
    
    function addLog(message, type = '') {
      const div = document.createElement('div');
      div.textContent = message;
      if (type) div.classList.add(type);
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
    }
    
    // Button handlers
    document.getElementById('test-direct').addEventListener('click', async () => {
      try {
        addLog('Testing direct Three.js import...', 'success');
        const THREE = await import('three');
        addLog(`Direct import successful! Three.js version: ${THREE.REVISION}`, 'success');
        createCube(THREE);
      } catch (err) {
        addLog(`Error: ${err.message}`, 'error');
      }
    });
    
    document.getElementById('test-central').addEventListener('click', async () => {
      try {
        addLog('Testing centralized Three.js module...', 'success');
        const ThreeModule = await import('/utils/three.js');
        await ThreeModule.default.init();
        const THREE = ThreeModule.default.THREE;
        addLog(`Centralized module load successful! Three.js version: ${THREE.REVISION}`, 'success');
        createCube(THREE);
      } catch (err) {
        addLog(`Error: ${err.message}`, 'error');
      }
    });
    
    // Create test scene
    function createCube(THREE) {
      const canvas = document.getElementById('canvas');
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x121c2c);
      
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 5;
      
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      
      const geometry = new THREE.BoxGeometry(1, 1, 1);
      const material = new THREE.MeshNormalMaterial();
      const cube = new THREE.Mesh(geometry, material);
      scene.add(cube);
      
      // Animation
      function animate() {
        requestAnimationFrame(animate);
        cube.rotation.x += 0.01;
        cube.rotation.y += 0.01;
        renderer.render(scene, camera);
      }
      
      // Start animation
      animate();
      
      // Handle window resize
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }
  </script>
</body>
</html>
