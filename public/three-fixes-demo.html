<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js Fixes Demo</title>
  
  <!-- IMPORTANT: Load fix loader BEFORE any Three.js scripts -->
  <script src="/three-fix-loader.js"></script>
  
  <!-- Then load Three.js -->
  <script type="module">
    // Wait for fixes to load before importing Three.js
    window.waitForThreeJsFixes().then(() => {
      import('https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.module.js').then((THREE) => {
        console.log("Three.js loaded successfully!");
        initScene();
      });
    });
    
    // Initialize 3D scene
    function initScene() {
      // Scene setup
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      
      // Renderer with specific fixes applied
      const renderer = new THREE.WebGLRenderer({ 
        antialias: true,
        alpha: true,
        canvas: document.getElementById('demo-canvas')
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      
      // Fix potential outputColorSpace issues
      if (renderer.outputColorSpace) {
        renderer.outputColorSpace = 'srgb';
      } else if (renderer.outputEncoding) {
        renderer.outputEncoding = THREE.sRGBEncoding;
      }
      
      // Create a simple cube
      const geometry = new THREE.BoxGeometry(1, 1, 1);
      const material = new THREE.MeshStandardMaterial({ 
        color: 0x00ff99,
        metalness: 0.3,
        roughness: 0.4
      });
      const cube = new THREE.Mesh(geometry, material);
      scene.add(cube);
      
      // Add lighting
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambientLight);
      
      const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
      directionalLight.position.set(2, 2, 2);
      scene.add(directionalLight);
      
      // Position camera
      camera.position.z = 3;
      
      // Animation loop
      function animate() {
        requestAnimationFrame(animate);
        
        // Rotate cube
        cube.rotation.x += 0.01;
        cube.rotation.y += 0.01;
        
        // Render scene
        renderer.render(scene, camera);
      }
      
      // Handle window resize
      window.addEventListener('resize', () => {
        // Update camera
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        
        // Update renderer
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
      
      // Start animation
      animate();
    }
  </script>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000;
    }
    
    canvas {
      display: block;
      width: 100%;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="demo-canvas"></canvas>
</body>
</html>
