<!-- 
  This file contains recommended Content Security Policy meta tags
  Include this file in your Astro project where needed to relax CSP restrictions
  that might be blocking Three.js resources
-->

<!-- Relaxed CSP for Three.js development -->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self' 'unsafe-inline' 'unsafe-eval';
  script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com;
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src 'self' data: https://fonts.googleapis.com https://fonts.gstatic.com https://*.synthed.xyz;
  img-src 'self' data: blob: https://*.synthed.xyz;
  connect-src 'self' https://cdn.jsdelivr.net https://unpkg.com https://*.synthed.xyz;
  worker-src 'self' blob:;
  object-src 'none';
  frame-src 'self';
">

<!-- Font family preconnect for better performance -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- Preload local font files to avoid CORS issues -->
<link rel="preload" href="/fonts/Axiforma-Medium.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/fonts/Axiforma-Bold.woff2" as="font" type="font/woff2" crossorigin>

<!-- CSS for proper font fallbacks -->
<style>
  @font-face {
    font-family: 'Axiforma';
    font-style: normal;
    font-weight: 500;
    font-display: swap;
    src: local('Axiforma Medium'), local('Axiforma-Medium'),
         url('/fonts/Axiforma-Medium.woff2') format('woff2');
  }
  
  @font-face {
    font-family: 'Axiforma';
    font-style: normal;
    font-weight: 700;
    font-display: swap;
    src: local('Axiforma Bold'), local('Axiforma-Bold'),
         url('/fonts/Axiforma-Bold.woff2') format('woff2');
  }
</style>
